<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Sketch — Brand Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #f0f0f0;
    --line:  #dadadd;
    --text:  #1a1a1b;
    --muted: #7b7a82;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    gap: 48px;
  }

  .wordmark {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
  }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 560px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }

  .card:hover {
    border-color: #aaa;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .card-icon { font-size: 26px; line-height: 1; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .card-arrow {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }

  footer {
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div>
  <div class="wordmark">Gravity Sketch</div>
  <div class="tagline">Internal brand tools</div>
</div>

<div class="grid">
  <a class="card" href="gravity-sketch-brand-explorer.html">
    <div class="card-icon">🎨</div>
    <div class="card-title">Brand Explorer</div>
    <div class="card-desc">Browse colours, typography, and visual language. Preview assets across backgrounds and lighting.</div>
    <div class="card-arrow">Open →</div>
  </a>

  <a class="card" href="gravity-sketch-3d-generator.html">
    <div class="card-icon">✦</div>
    <div class="card-title">3D Asset Generator</div>
    <div class="card-desc">Generate 3D brand strokes and script letterforms. Export as PNG or GIF.</div>
    <div class="card-arrow">Open →</div>
  </a>
</div>


</body>
</html>
